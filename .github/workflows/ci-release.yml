# CI, CodeQL SAST, semantic version tagging, API binaries, GitHub Release assets, and GHCR images.
#
# CodeQL uploads to the Security tab (Code scanning). To block merges on alerts, enable a branch
# protection rule that requires code scanning results to pass.
#
# GHCR images: ghcr.io/<owner-lowercase>/kurator-api and kurator-web.

name: CI, security, and release

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: API unit tests
        working-directory: api
        run: go test ./... -count=1

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Web unit tests
        working-directory: web
        run: npm ci && npm test

  codeql-go:
    name: CodeQL (Go)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: go
          queries: security-extended

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Build Go (api) for CodeQL
        working-directory: api
        run: go build ./...

      - uses: github/codeql-action/analyze@v3

  codeql-js:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-extended

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web for CodeQL
        working-directory: web
        run: npm ci && npm run build

      - uses: github/codeql-action/analyze@v3

  release:
    needs: [unit-tests, codeql-go, codeql-js]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lowercase owner for GHCR
        id: ns
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Bump SemVer tag (conventional commits; default patch)
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_branches: main

      - uses: actions/setup-go@v5
        if: steps.tag_version.outputs.new_tag != ''
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Build API binaries (Linux and macOS, arm64 and amd64)
        if: steps.tag_version.outputs.new_tag != ''
        working-directory: api
        env:
          VERSION: ${{ steps.tag_version.outputs.new_tag }}
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          for spec in linux,amd64 linux,arm64 darwin,amd64 darwin,arm64; do
            goos=${spec%,*}
            goarch=${spec#*,}
            out="${GITHUB_WORKSPACE}/dist/kurator-api-${VERSION}-${goos}-${goarch}"
            CGO_ENABLED=0 GOOS=$goos GOARCH=$goarch go build -trimpath -ldflags="-s -w" -o "$out" ./cmd/api
            chmod +x "$out"
          done

      - name: Create GitHub Release and attach binaries
        if: steps.tag_version.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          generate_release_notes: true
          files: dist/kurator-api-*

      - name: Upload release binaries as workflow artifacts
        if: steps.tag_version.outputs.new_tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: kurator-api-binaries-${{ steps.tag_version.outputs.new_tag }}
          path: dist/kurator-api-*

      - name: Set up Docker Buildx
        if: steps.tag_version.outputs.new_tag != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.tag_version.outputs.new_tag != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        if: steps.tag_version.outputs.new_tag != ''
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/kurator-api:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/kurator-api:latest
          labels: |
            org.opencontainers.image.version=${{ steps.tag_version.outputs.new_tag }}

      - name: Build and push Web image
        if: steps.tag_version.outputs.new_tag != ''
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          build-args: |
            API_INTERNAL_URL=http://kurator-api:8080
            NEXT_PUBLIC_API_URL=http://localhost:8080
            NEXT_PUBLIC_LAUNCHDARKLY_CLIENT_SIDE_ID=${{ secrets.LAUNCHDARKLY_CLIENT_SIDE_ID }}
            NEXT_PUBLIC_SENTRY_DSN=${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
            SENTRY_ORG=${{ secrets.SENTRY_ORG }}
            SENTRY_PROJECT=${{ secrets.SENTRY_PROJECT }}
            SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/kurator-web:${{ steps.tag_version.outputs.new_tag }}
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/kurator-web:latest
          labels: |
            org.opencontainers.image.version=${{ steps.tag_version.outputs.new_tag }}
