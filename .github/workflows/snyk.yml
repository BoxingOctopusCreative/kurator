name: Snyk Security

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

concurrency:
  group: snyk-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip.outputs.should_skip }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for CI or INFO commit prefix
        id: skip
        run: |
          # Only check for skip prefixes on code changes (push/PR)
          if [[ "${{ github.event_name }}" == "push" || "${{ github.event_name }}" == "pull_request" ]]; then
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if [[ "$COMMIT_MSG" =~ ^(CI|INFO): ]]; then
              echo "should_skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "should_skip=false" >> "$GITHUB_OUTPUT"

  snyk:
    needs: [check-skip]
    runs-on: ubuntu-latest
    # Added the check for should_skip here
    if: |
      needs.check-skip.outputs.should_skip != 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4

      - uses: snyk/actions/setup@v1

      - uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Snyk test (API — Go)
        working-directory: api
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --project-name=kurator-api

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies for Snyk
        working-directory: web
        run: npm ci

      - name: Snyk test (Web — npm)
        working-directory: web
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --project-name=kurator-web

      - name: Snyk Code (repo)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test

      - name: Snyk monitor (main only — refresh Snyk UI projects)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          set -euo pipefail
          (cd api && snyk monitor --project-name=kurator-api)
          (cd web && snyk monitor --project-name=kurator-web)