# Infrastructure-only stack (e.g. Postgres for local dev).
# Apply schema via the web /setup page (SETUP_ENABLED) or api/internal/migrate against DATABASE_URL.
# Run from repo root: docker compose -f infra/docker-compose.yml up -d
# Stop the root docker-compose postgres first if both map host port 5432.

name: kurator-infra

services:
  postgres:
    image: postgres:latest
    container_name: kurator-infra-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kurator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kurator}
      POSTGRES_DB: ${POSTGRES_DB:-kurator}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kurator_infra_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kurator} -d ${POSTGRES_DB:-kurator}"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  
  minio:
    image: minio/minio:latest
    container_name: kurator-infra-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-kurator}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kurator}
    ports:
      - "${MINIO_PORT:-9000}:9000"
    volumes:
      - kurator_infra_minio:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: kurator-infra-minio-init
    depends_on:
      kurator-infra-minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        sleep 2
        mc alias set local http://kurator-infra-minio:9000 kurator "$$MINIO_ROOT_PASSWORD"
        mc mb local/kurator-covers --ignore-existing
        mc anonymous set download local/kurator-covers
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kurator_dev_minio_secret}
    restart: "no"

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: kurator-infra-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - kurator_infra_meili_data:/meili_data
    restart: unless-stopped

volumes:
  kurator_infra_pg_data:
  kurator_infra_minio:
  kurator_infra_meili_data: