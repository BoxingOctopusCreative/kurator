# Local dependency stack (Postgres, Meilisearch, Valkey, Swagger UI).
# Apply schema via API startup bootstrap, `go run ./cmd/migrate`, or DATABASE_URL + api/internal/migrate.
# Run from repo root: podman compose -f infra/docker-compose.yml up -d  (or docker compose)
# If another Postgres on the host already uses 5432, set POSTGRES_PORT.
#
# Swagger UI (OpenAPI from api/docs/swagger.json): http://localhost:${SWAGGER_UI_PORT:-8081}

name: kurator-infra

services:
  postgres:
    image: postgres:latest
    container_name: kurator-infra-postgres
    cpus: "1.50"
    mem_limit: 1g
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kurator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kurator}
      POSTGRES_DB: ${POSTGRES_DB:-kurator}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - kurator_infra_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kurator} -d ${POSTGRES_DB:-kurator}"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: kurator-infra-meilisearch
    cpus: "1.00"
    mem_limit: 1g
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - kurator_infra_meili_data:/meili_data
    restart: unless-stopped

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    container_name: kurator-infra-swagger-ui
    cpus: "0.25"
    mem_limit: 256m
    environment:
      BASE_URL: /
      SWAGGER_JSON: /mnt/swagger.json
    ports:
      - "${SWAGGER_UI_PORT:-8081}:8080"
    volumes:
      - ../api/docs/swagger.json:/mnt/swagger.json:ro
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8-alpine
    container_name: kurator-infra-valkey
    cpus: "0.25"
    mem_limit: 256m
    environment:
      VALKEY_SAVE_INTERVAL: "60"
      VALKEY_MAX_RETRIES: "1"
    restart: unless-stopped
    ports:
      - "${VALKEY_PORT:-6379}:6379"

volumes:
  kurator_infra_pg_data:
  kurator_infra_meili_data: