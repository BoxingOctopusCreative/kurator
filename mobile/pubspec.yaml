name: kurator_mobile
description: Kurator mobile app — collect and curate what you love.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^17.2.3
  shared_preferences: ^2.3.2
  dio: ^5.8.0+1
  url_launcher: ^6.3.1
  dio_cookie_manager: ^3.2.0
  cookie_jar: ^4.0.8
  path_provider: ^2.1.5
  flutter_svg: ^2.0.10+1
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # Optional: OpenDyslexic — add .otf files under assets/fonts/ before declaring.
  # fonts:
  #   - family: OpenDyslexic
  #     fonts:
  #       - asset: assets/fonts/OpenDyslexic-Regular.otf
  #         weight: 400
  #       - asset: assets/fonts/OpenDyslexic-Bold.otf
  #         weight: 700
  #
  # Futura PT (Adobe Fonts): same CSS family name as Typekit (`futura-pt`).
  # Uncomment and add files you are licensed to ship (web kit alone does not
  # license native embedding). Typical ParaType filenames: FuturaPT-Book.otf, etc.
  # fonts:
  #   - family: futura-pt
  #     fonts:
  #       - asset: assets/fonts/futura_pt/FuturaPT-Book.otf
  #         weight: 400
  #       - asset: assets/fonts/futura_pt/FuturaPT-Medium.otf
  #         weight: 500
  #       - asset: assets/fonts/futura_pt/FuturaPT-Bold.otf
  #         weight: 700
  assets:
    - assets/images/
