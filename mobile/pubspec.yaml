name: kurator_mobile
description: Kurator mobile app — collect and curate what you love.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  provider: ^6.1.2
  go_router: ^14.2.7
  shared_preferences: ^2.3.2
  flutter_svg: ^2.0.10+1
  lucide_icons: ^0.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
          weight: 400
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
  assets:
    - assets/images/
