services:
  nginx:
    image: nginx:alpine
    container_name: kurator-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - kurator-web-1
      - kurator-web-2
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: kurator-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kurator
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kurator_dev_minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - kurator_minio:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: kurator-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        sleep 2
        mc alias set local http://minio:9000 kurator "$$MINIO_ROOT_PASSWORD"
        mc mb local/kurator-covers --ignore-existing
        mc anonymous set download local/kurator-covers
    environment:
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-kurator_dev_minio_secret}
    restart: "no"

  kurator-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: kurator-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://kurator:kurator@postgres:5432/kurator?sslmode=disable
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY:-dev_master_key}
      MEILISEARCH_INDEX: kurator_items
      HTTP_ADDR: ":8080"
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev_only_change_me_in_production_use_long_random}
      SESSION_MAX_AGE_SECONDS: ${SESSION_MAX_AGE_SECONDS:-2592000}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080,http://localhost:9000
      S3_BUCKET: kurator-covers
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: kurator
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-kurator_dev_minio_secret}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-http://localhost:9000/kurator-covers}
      # Optional metadata lookups (Add item title search)
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      DISCOGS_PERSONAL_TOKEN: ${DISCOGS_PERSONAL_TOKEN:-}
      THEGAMESDB_API_KEY: ${THEGAMESDB_API_KEY:-}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      COMICVINE_API_KEY: ${COMICVINE_API_KEY:-}
      # Allow POST /api/v1/setup/migrate (disable in production after bootstrap)
      SETUP_ENABLED: ${SETUP_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  kurator-web-1: &kurator_web
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        API_INTERNAL_URL: ${API_INTERNAL_URL:-http://kurator-api:8080}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://kurator-api:8080
      # Landing page background (https://unsplash.com/oauth/applications)
      UNSPLASH_ACCESS_KEY: ${UNSPLASH_ACCESS_KEY:-}
    depends_on:
      - kurator-api
    restart: unless-stopped
    expose:
      - "3000"

  kurator-web-2:
    <<: *kurator_web

  postgres:
    image: postgres:latest
    container_name: kurator-postgres
    environment:
      POSTGRES_USER: kurator
      POSTGRES_PASSWORD: kurator
      POSTGRES_DB: kurator
    ports:
      - "5432:5432"
    volumes:
      - kurator_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kurator -d kurator"]
      interval: 3s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: kurator-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-dev_master_key}
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - kurator_meili_data:/meili_data
    restart: unless-stopped

volumes:
  kurator_pg_data:
  kurator_meili_data:
  kurator_minio:
