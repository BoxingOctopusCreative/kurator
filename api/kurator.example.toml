# Example Kurator API config (copy to kurator.toml).
# Precedence: environment variables > CLI flags > this file > built-in defaults.
# Config file path: -c/--config flag, or KURATOR_CONFIG, or ./kurator.toml if present.
#
# Settings are grouped by TOML table. Environment variable names are unchanged
# (e.g. DATABASE_URL, S3_BUCKET). Migrate older flat kurator.toml files into these sections.

[server]
http_addr = ":8080"

[database]
url = "postgres://kurator:kurator@localhost:5432/kurator?sslmode=disable"

[meilisearch]
host = "http://localhost:7700"
api_key = ""
index = "kurator_items"

[cors]
origins = ["http://localhost:3000"]

[auth]
jwt_secret = "dev_only_change_me_in_production_use_long_random"
session_max_age_seconds = 2592000
cookie_secure = false

# Private beta: set BETA_ACCESS_REQUIRED=true (or access_required below). Requires migrations through 033_beta_access_invites.
# Request flow emails BETA_ADMIN_EMAIL (default below). Set public_web_base_url or PUBLIC_WEB_BASE_URL to your app origin
# (e.g. https://app.example.com) so approve/invite links work. Mailgun must be configured for emails to send.
[beta]
access_required = false
admin_email = "ryan.draga@boxingoctop.us"
public_web_base_url = "http://localhost:3000"

# S3-compatible storage (MinIO, AWS S3, Cloudflare R2, etc.).
# endpoint = S3 API URL for the server (e.g. R2 https://<id>.r2.cloudflarestorage.com or MinIO http://minio:9000).
# public_base_url = browser-facing base for GET (no auth). Must allow anonymous read of uploaded objects.
#
# Cloudflare R2: do NOT set public_base_url to the same *.r2.cloudflarestorage.com host as endpoint — that host
# is for signed S3 API calls only; <img src> in the app will 403. Link a public custom domain to the bucket
# (R2 dashboard → bucket → custom domains) and set public_base_url to https://your.cdn.example.com (often
# without repeating the bucket name in the path; object keys are still covers/…, avatars/…, banners/…).
#
# Local MinIO (docker-compose): public_base_url = "http://localhost:9000/kurator-covers" (path-style; bucket in path).
[s3]
bucket = ""
region = "us-east-1"
endpoint = ""
access_key_id = ""
secret_access_key = ""
public_base_url = ""
key_prefix = "covers"

[metadata]
user_agent = ""
discogs_personal_token = ""
thegamesdb_api_key = ""
google_books_api_key = ""
tmdb_api_key = ""
comicvine_api_key = ""

[turnstile]
enabled = false
secret_key = ""

[mailgun]
api_key = ""
domain = ""
from = ""
api_base = ""

# Optional error monitoring (https://docs.sentry.io/platforms/go/guides/fiber/).
# Prefer env SENTRY_DSN in production instead of committing a DSN here.
[sentry]
dsn = ""
environment = ""
